career-profile:
    title: Career Profile
    text: 'Jinki Jung is a senior software developer of <a href="https://dmc.international/" target="_blank">Digital Maritime Consultancy</a> primarily working on <a href="https://maritimeconnectivity.net" target="_blank">Maritime Connecivity Platform (MCP)</a>.
						He received Ph.D. in Computer Science with the topic of Augmented Reality from <a href="https://www.kaist.ac.kr/html/en/index.html" target="_blank">KAIST</a>.
						His primary interest is to investigate assessments on safety factor with simulation, VR, and AR.
            Now turning into the MCP world, he is participating working group activities and implementation as you can find in <a href="https://github.com/maritimeconnectivity">MCP Consortium repository</a>.
            You can <a href="https://github.com/JinkiJung/online-cv/blob/master/_data/Curriculum_vitae_230202.pdf" target="_blank">download my CV here</a>.'

